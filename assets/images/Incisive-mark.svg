<?xml version="1.0" encoding="UTF-8"?>
<svg width="80" height="80" viewBox="0 0 80 80"
     xmlns="http://www.w3.org/2000/svg" overflow="visible">
  <rect width="80" height="80" fill="#f5f5f5"/>
  <!-- Top piece: TL corner → top edge → TR cut point → diagonal → BL cut point → up left edge -->
  <path d="M 12 58 L 12 19 Q 12 14 17 14 L 63 14 L 68 14 Z"
        fill="none" stroke="#111111" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Bottom piece: rotates 6° CW around BL corner (12,58) — the falling half -->
  <g transform="rotate(6, 12, 58)">
    <path d="M 68 14 L 68 53 Q 68 58 63 58 L 17 58 L 12 58 Z"
          fill="none" stroke="#111111" stroke-width="2.2" stroke-linejoin="round"/>
  </g>
  <!-- Slash: exact corner-to-corner (BL→TR), extended ~14px past each end -->
  <line x1="1" y1="67" x2="79" y2="5"
        stroke="#111111" stroke-width="3.5" stroke-linecap="round"/>
</svg>